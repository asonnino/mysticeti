# Documentation for all configuration options:
# https://docs.github.com/en/code-security/dependabot/dependabot-version-updates/configuration-options-for-the-dependabot.yml-file
version: 2
updates:
  - package-ecosystem: "cargo"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "sunday"
    commit-message:
      prefix: "fix"
      prefix-development: "chore"
      include: "scope"
    groups:
      cargo-minor-and-patch-dependencies:
        update-types:
          - "minor"
          - "patch"
    ignore:
      # bincode 3.0.0 is a deliberately non-compiling protest release.
      - dependency-name: "bincode"
        update-types: ["version-update:semver-major"]
      # digest 0.11 can't be adopted until blake2 / ed25519-consensus move off the
      # digest 0.10 `Digest` trait; bumping digest alone yields two incompatible traits.
      - dependency-name: "digest"
        versions: ["0.11"]
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "monthly"
    commit-message:
      prefix: "chore"
      include: "scope"
    groups:
      github-actions-all:
        patterns: ["*"]
