name: Claude Code
on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]
  issues:
    types: [opened, assigned]
  pull_request_review:
    types: [submitted]
# Serialize events on the same issue / PR so a rapid burst of `@claude`
# mentions can't fan out into parallel jobs that burn quota.
concurrency:
  group: claude-${{ github.event.issue.number || github.event.pull_request.number || github.ref }}
  cancel-in-progress: false
jobs:
  authorize:
    # Verify the user who triggered the event (the sender) has real write
    # access to this repo via the REST API. `author_association` is not a
    # reliable proxy (MEMBER and COLLABORATOR can both be read-only), and
    # checking `issue.author_association` on `assigned` events looks up the
    # opener, not the assigner — so the gate would never pass on assignments
    # of externally-opened issues.
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      allowed: ${{ steps.check.outputs.allowed }}
    steps:
      - id: check
        env:
          GH_TOKEN: ${{ github.token }}
          ACTOR: ${{ github.event.sender.login }}
          OWNER: ${{ github.repository_owner }}
          REPO: ${{ github.repository }}
        run: |
          if [[ "$ACTOR" == "$OWNER" ]]; then
            echo "allowed=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          endpoint="/repos/$REPO/collaborators/$ACTOR/permission"
          perm=$(gh api "$endpoint" --jq '.permission' 2>/dev/null || echo "none")
          case "$perm" in
            admin|maintain|write) echo "allowed=true" >> "$GITHUB_OUTPUT" ;;
            *) echo "allowed=false" >> "$GITHUB_OUTPUT" ;;
          esac
  claude:
    needs: authorize
    if: |
      needs.authorize.outputs.allowed == 'true'
      && ((github.event_name == 'issue_comment' && contains(github.event.comment.body || '', '@claude'))
      || (github.event_name == 'pull_request_review_comment' && contains(github.event.comment.body || '', '@claude'))
      || (github.event_name == 'pull_request_review' && contains(github.event.review.body || '', '@claude'))
      || (github.event_name == 'issues' && contains(github.event.issue.body || '', '@claude'))
      || (github.event_name == 'issues' && contains(github.event.issue.title || '', '@claude')))
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
      issues: read
      id-token: write
      actions: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # pin@v6.0.2
        with:
          fetch-depth: 1
      - name: Run Claude Code
        id: claude
        uses: anthropics/claude-code-action@4e5d8b13ca281a6d163cdb287d8917b216e00d6f # pin@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          # This is an optional setting that allows Claude to read CI results on PRs
          additional_permissions: |
            actions: read
