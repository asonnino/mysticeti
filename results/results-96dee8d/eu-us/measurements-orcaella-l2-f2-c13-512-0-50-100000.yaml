    dag:
      round_timeout:
        secs: 1
        nanos: 0
      max_block_size: 4194304
      enable_synchronizer: false
      fsync: false
    consensus:
      protocol: orcaella
      leader_count: 2
      f: 2
      c: 13
  client_parameters:
    load: 10
    transaction_size: 512
    initial_delay: 3m
  nodes: 50
  load: 100000
