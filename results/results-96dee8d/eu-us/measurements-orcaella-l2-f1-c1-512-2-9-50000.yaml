parameters:
  settings:
    testbed_id: alberto-mysticeti
    cloud_provider: !Aws
      specs: m5d.8xlarge
    ssh_public_key_file: null
    regions:
      - us-east-1
      - us-east-2
      - eu-central-1
      - eu-west-2
      - eu-west-3
      - ap-northeast-1
    repository:
      url: https://github.com/asonnino/mysticeti.git
      commit: orchestrator-refinements
    node_parameters_path: crates/orchestrator/assets/node-parameters.yml
    client_parameters_path: crates/orchestrator/assets/client-parameters.yml
    benchmark_duration: 120
    faults: !Permanent
      faults: 2
    working_dir: ~/working_dir
    results_dir: ./results
    logs_dir: ./logs
    nvme: true
    scrape_interval: 15
    log_processing: false
    dedicated_clients: 0
    monitoring: true
    ssh_timeout: 30
    ssh_retries: 3
    health_check_timeout: 120
  node_parameters:
    dag:
      round_timeout:
        secs: 1
        nanos: 0
      max_block_size: 4194304
      enable_synchronizer: false
      fsync: false
    consensus:
      protocol: orcaella
      leader_count: 2
      f: 1
      c: 1
  client_parameters:
    load: 10
    transaction_size: 512
    initial_delay: 30s
  nodes: 9
  load: 50000
