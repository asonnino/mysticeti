        nanos: 0
      max_block_size: 4194304
      enable_synchronizer: false
      fsync: false
    consensus:
      protocol: mysticeti
      leader_count: 2
  client_parameters:
    load: 10
    transaction_size: 512
    initial_delay: 3m
  nodes: 49
  load: 50000
