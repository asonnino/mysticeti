    working_dir: ~/working_dir
    results_dir: ./results
    logs_dir: ./logs
    nvme: true
    scrape_interval: 15
    log_processing: false
    dedicated_clients: 0
    monitoring: true
    ssh_timeout: 30
    ssh_retries: 3
    health_check_timeout: 120
