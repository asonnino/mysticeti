parameters:
  settings:
    testbed_id: alberto-mysticeti
    cloud_provider: !Aws
      specs: m5d.8xlarge
    ssh_public_key_file: null
    regions:
      - us-east-1
      - us-east-2
      - eu-central-1
      - eu-west-2
      - eu-west-3
      - ap-northeast-1
    repository:
      url: https://github.com/asonnino/mysticeti.git
