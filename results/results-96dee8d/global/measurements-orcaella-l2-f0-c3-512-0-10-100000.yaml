parameters:
  settings:
    testbed_id: alberto-mysticeti
    cloud_provider: !Aws
      specs: m5d.8xlarge
    ssh_public_key_file: null
    regions:
      - us-west-1
      - us-west-2
      - ca-central-1
      - eu-central-1
      - eu-west-1
      - eu-west-2
      - eu-west-3
      - eu-north-1
      - ap-south-1
      - ap-southeast-1
      - ap-southeast-2
      - ap-northeast-1
      - ap-northeast-2
    repository:
      url: https://github.com/asonnino/mysticeti.git
      commit: orchestrator-refinements
    node_parameters_path: crates/orchestrator/assets/node-parameters.yml
    client_parameters_path: crates/orchestrator/assets/client-parameters.yml
    benchmark_duration: 300
    faults: !Permanent
      faults: 0
    working_dir: ~/working_dir
    results_dir: ./results
    logs_dir: ./logs
    nvme: true
    scrape_interval: 15
    log_processing: false
    dedicated_clients: 0
    monitoring: true
    ssh_timeout: 30
    ssh_retries: 3
    health_check_timeout: 120
  node_parameters:
    dag:
      round_timeout:
        secs: 1
        nanos: 0
      max_block_size: 4194304
      enable_synchronizer: false
      fsync: false
    consensus:
      protocol: orcaella
      leader_count: 2
      f: 0
      c: 3
  client_parameters:
    load: 10
    transaction_size: 512
    initial_delay: 3m
  nodes: 10
  load: 100000
